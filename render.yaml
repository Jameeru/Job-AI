services:
  - type: web
    name: job-ai-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://job-ai-58665.web.app"
      - key: BEDROCK_ACCESS_KEY
        sync: false
      - key: BEDROCK_SECRET_KEY
        sync: false
      - key: BEDROCK_REGION
        value: "us-east-1"
      - key: AGENT_API_KEY
        generateValue: true
      - key: FIREBASE_PROJECT_ID
        sync: false

  - type: web
    name: job-ai-playwright-agent
    env: docker
    plan: free
    dockerfilePath: ./playwright-agent/Dockerfile
    dockerContext: ./playwright-agent
    envVars:
      - key: API_URL
        value: "https://job-ai-backend.onrender.com/api" # Adjust to match actual backend URL
      - key: AGENT_API_KEY
        fromService:
          type: web
          name: job-ai-backend
          envVarKey: AGENT_API_KEY
