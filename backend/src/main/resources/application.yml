# ─────────────────────────────────────────────────
# Job AI Backend — Base Configuration
# Active profile is controlled by SPRING_PROFILES_ACTIVE env var
# Dev → application-dev.yml  |  Prod → application-prod.yml
# ─────────────────────────────────────────────────

spring:
  application:
    name: job-ai-backend

  # Profile-specific configs are merged automatically
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── Jackson ──
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: Asia/Kolkata

  # ── JPA (base settings; datasource overridden per profile) ──
  jpa:
    open-in-view: false          # Prevent LazyInitializationException in REST context
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true
        generate_statistics: false

  # ── Flyway ──
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# ── Application Metadata ──
info:
  app:
    name: Job AI Application Agent
    version: 1.0.0
    description: AI-powered job application assistant for 2025 freshers

# ── Logging ──
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.jobai: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# ── OpenAPI / Swagger ──
springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: false

# ── Job AI custom properties ──
jobai:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  firebase:
    project-id: ${FIREBASE_PROJECT_ID}
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:firebase-service-account.json}
  aws:
    region: ${AWS_REGION:ap-south-1}
    bedrock:
      model-id: ${BEDROCK_MODEL_ID:anthropic.claude-sonnet-4-20250514-v1:0}
      max-tokens: 4096
  scheduler:
    job-search-cron: ${JOB_SEARCH_CRON:0 0 7 * * *}   # 7 AM IST daily
    enabled: ${SCHEDULER_ENABLED:true}
  resume:
    output-dir: ${RESUME_OUTPUT_DIR:./generated/resumes}
  cover-letter:
    output-dir: ${COVER_LETTER_OUTPUT_DIR:./generated/cover-letters}
  scraper:
    request-delay-ms: ${SCRAPER_DELAY_MS:2000}         # Be polite to job sites
    max-jobs-per-source: ${MAX_JOBS_PER_SOURCE:50}
    min-match-score: ${MIN_MATCH_SCORE:8}
